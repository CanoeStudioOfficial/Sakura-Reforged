// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }

repositories {
    // Put repositories for dependencies here
    // ForgeGradle automatically adds the Forge maven and Maven Central for you

    maven { url = "https://raw.github.com/0999312/MMMaven/main/repository" }
    maven {
        url = "https://maven.theillusivec4.top/"
    }

    // Patchouli
    maven { url = 'https://maven.blamejared.com' }

    //maven {
      // location of a maven mirror for JEI files, as a fallback
      //name = "ModMaven"
      //url = "https://modmaven.dev"
    //}
    maven {
        url = "https://api.modrinth.com/maven"
    }
}


dependencies {

    modImplementation ("cn.mcmod_mmf.mysterious_mountain_lib:MMLib:1.4.12-1.20.1")
    // Compile against only the API artifact
    modCompileOnly(("top.theillusivec4.curios:curios-forge:5.4.5+1.20.1:api"))
    // Use the full Curios API jar at runtime
    modRuntimeOnly(("top.theillusivec4.curios:curios-forge:5.4.5+1.20.1"))
    modCompileOnly ("vazkii.patchouli:Patchouli:1.20.1-83-FORGE")
    modRuntimeOnly ("vazkii.patchouli:Patchouli:1.20.1-83-FORGE")

    // compile against the JEI API but do not include it at runtime
    modCompileOnly(("mezz.jei:jei-${mc_version}-common-api:${jei_version}"))
    modCompileOnly(("mezz.jei:jei-${mc_version}-forge-api:${jei_version}"))
    // at runtime, use the full JEI jar for Forge
    modRuntimeOnly(("mezz.jei:jei-${mc_version}-forge:${jei_version}"))

    //implementation ("maven.modrinth:epic-fight:20.9.2")
    modCompileOnly ("maven.modrinth:farmers-delight:1.20.1-1.2.7")
}

// Example for how to get properties into the manifest for reading at runtime.
jar {
    manifest {
        attributes([
                "Specification-Title"     : "sakura",
                "Specification-Vendor"    : "tracen_minecraft_group",
                "Specification-Version"   : "0.0.2",
                "Implementation-Title"    : project.name,
                "Implementation-Version"  : project.jar.archiveVersion,
                "Implementation-Vendor"   : "tracen_minecraft_group",
                "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
                "MixinConfigs"            : "mixins.sakura.json"
        ])
    }
}

jar.finalizedBy('reobfJar')

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${maven_loc}"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
